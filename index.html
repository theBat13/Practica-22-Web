<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Fórmula General</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #27ae60; }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fórmula General</h2>
    <p>ax² + bx + c = 0</p>
    
    <div class="input-group">
        <label>Valor de a:</label>
        <input type="number" id="a" placeholder="Ingresa a">
    </div>
    
    <div class="input-group">
        <label>Valor de b:</label>
        <input type="number" id="b" placeholder="Ingresa b">
    </div>
    
    <div class="input-group">
        <label>Valor de c:</label>
        <input type="number" id="c" placeholder="Ingresa c">
    </div>

    <button onclick="calcularChicharronera()">Calcular x1 y x2</button>

    <div id="resultado"></div>
</div>

<script>
    function calcularChicharronera() {
        const a = parseFloat(document.getElementById('a').value);
        const b = parseFloat(document.getElementById('b').value);
        const c = parseFloat(document.getElementById('c').value);
        const resDiv = document.getElementById('resultado');

        if (isNaN(a) || isNaN(b) || isNaN(c)) {
            mostrarMensaje("Por favor, llena todos los campos.", "#e74c3c");
            return;
        }

        if (a === 0) {
            mostrarMensaje("El valor de 'a' no puede ser 0.", "#e74c3c");
            return;
        }

        const discriminante = Math.pow(b, 2) - (4 * a * c);

        if (discriminante < 0) {
            mostrarMensaje("La ecuación no tiene soluciones reales (Raíz negativa).", "#f39c12");
        } else {
            const x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
            const x2 = (-b - Math.sqrt(discriminante)) / (2 * a);

            mostrarMensaje(`Resultados:<br>x1 = ${x1.toFixed(4)}<br>x2 = ${x2.toFixed(4)}`, "#d4edda");
            resDiv.style.color = "#155724";
            resDiv.style.border = "1px solid #c3e6cb";
            
            console.log(`x1: ${x1}, x2: ${x2}`);
        }
    }

    function mostrarMensaje(texto, colorFondo) {
        const resDiv = document.getElementById('resultado');
        resDiv.style.display = "block";
        resDiv.style.backgroundColor = colorFondo;
        resDiv.innerHTML = texto;
        if(colorFondo === "#e74c3c" || colorFondo === "#f39c12") resDiv.style.color = "white";
    }
</script>

</body>
</html>
